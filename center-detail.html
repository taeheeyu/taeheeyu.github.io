<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 - 자기소개</title>
    <!-- Google Fonts Noto Sans KR 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 초기화 */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #111111;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 페이지 페이드인 애니메이션 */
            animation: pageFadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 네비게이션/뒤로가기 영역 */
        .nav-header {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px 20px 20px;
            box-sizing: border-box;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #111111;
            font-size: 1.1rem;
            font-weight: 500;
            transition: transform 0.3s ease;
        }

        .back-btn span {
            margin-right: 8px;
            transition: transform 0.3s ease;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .back-btn:hover span {
            transform: translateX(-4px);
        }

        /* 메인 상세 컨텐츠 레이아웃 */
        .detail-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px; /* 간격을 좁혀 공간 확보 */
            width: 100%;
            max-width: 1100px;
            flex-grow: 1;
            padding: 20px 20px 80px 20px;
            box-sizing: border-box;
        }

        /* 이미지 영역 */
        .image-section {
            width: 50%; /* 가로 비중을 50%로 늘려 이미지 공간을 크게 확보 */
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .image-section img {
            width: 100%;
            max-height: 80vh; /* 세로 크기 제한을 80vh로 대폭 늘려 빨간선 크기만큼 확대 */
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.05));
        }

        /* 텍스트 정보 영역 */
        .info-section {
            width: 45%;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666666;
            margin: 0 0 40px 0;
            font-weight: 400;
        }

        /* 세련된 정보 카드 구성 */
        .info-card {
            background-color: #fafafa;
            border: 1px solid #eaeaea;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        }

        .info-card h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: #333333;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 10px;
        }

        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .info-list li {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #444444;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
        }

        .info-list li::before {
            content: "•";
            color: #111111;
            font-weight: bold;
            display: inline-block;
            width: 15px;
            margin-right: 5px;
            flex-shrink: 0;
        }

        .info-list li:last-child {
            margin-bottom: 0;
        }

        /* 반응형 모바일 대응 */
        @media (max-width: 768px) {
            .detail-container {
                flex-direction: column;
                gap: 40px;
                padding-bottom: 40px;
            }
            .image-section, .info-section {
                width: 100%;
            }
            .image-section img {
                max-height: 55vh; /* 모바일에서도 더 크게 보이도록 조정 */
            }
            .info-section h1 {
                font-size: 2rem;
            }
            .subtitle {
                margin-bottom: 25px;
            }
            .info-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="back-btn">
            <span>←</span> 홈으로 돌아가기
        </a>
    </header>

    <main class="detail-container">
        
        <div class="image-section">
            <img src="images/center-student.png" alt="학생 사진">
        </div>

        <div class="info-section">
            <h1>프로필</h1>
            <p class="subtitle">나를 소개합니다</p>

            <div class="info-card">
                <h2>🏫 학교 및 소속</h2>
                <ul class="info-list">
                    <li>금천고등학교 2학년 재학 중</li>
                    <li>가정 내 귀여운 막내</li>
                </ul>
            </div>

            <div class="info-card">
                <h2>✨ 특기</h2>
                <ul class="info-list">
                    <li>사랑스러운 애교 보유</li>
                    <li>열정적인 댄스 실력</li>
                </ul>
            </div>
        </div>

    </main>

</body>
</html>
