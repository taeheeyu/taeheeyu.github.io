<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 - 유태희</title>
    <style>
        /* 기본 스타일 초기화: 배경은 깨끗한 흰색, 글자는 검정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 상단 헤더 영역: 이름과 장래희망 */
        header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 20px;
            z-index: 10;
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
        }

        header p {
            font-size: 2rem;
            margin: 10px 0 0 0;
            font-weight: 400;
            color: #333333;
        }

        /* 메인 콘텐츠 영역: 3단 레이아웃 (왼쪽 그림 - 가운데 인물 - 오른쪽 그림) */
        .container {
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 인물과 그림이 바닥(아래쪽)을 향하도록 정렬 */
            width: 100%;
            max-width: 1200px;
            flex-grow: 1;
            position: relative;
            padding-bottom: 40px; /* 화면 하단과 약간의 여백 */
        }

        /* 각 섹션별 너비 지정 */
        .side-area {
            width: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .center-area {
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
        }

        /* 이미지 반응형 스타일 설정 */
        .side-area img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        .center-area img {
            width: 100%;
            max-height: 75vh; /* 화면 중앙과 살짝 아래에 꽉 차도록 설정 */
            object-fit: contain;
            display: block;
        }

        /* 반응형 모바일 대응: 화면이 작아지면 세로로 정렬 */
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            header p { font-size: 1.5rem; }
            .container { flex-direction: column; align-items: center; }
            .side-area, .center-area { width: 80%; }
            .center-area { order: 2; } /* 모바일에서는 인물이 가운데(순서상 아래)로 오게 조절 */
        }
    </style>
</head>
<body>

    <header>
        <h1>김정림</h1>
        <p>댄스가수</p>
    </header>

    <div class="container">
        
        <div class="side-area">
            <img src="images/left-drawings.PNG" alt="왼쪽 손그림">
        </div>

        <div class="center-area">
            <img src="images/center-student.PNG" alt="학생 사진">
        </div>

        <div class="side-area">
            <img src="images/right-drawings.PNG" alt="오른쪽 손그림">
        </div>

    </div>

</body>
</html>
